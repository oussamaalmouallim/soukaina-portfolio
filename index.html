<style>
  body {
    background-color: #FDF2F2;
    overflow-x: hidden;
    font-family: 'Inter', sans-serif;
  }
  .cosmic-gradient {
    background: radial-gradient(circle at top right, #f8d7da 0%, transparent 40%),
                radial-gradient(circle at bottom left, #e9d5ff 0%, transparent 40%),
                linear-gradient(135deg, #fdf2f2 0%, #fff9fb 100%);
  }
  .glass-portal {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }
  .floating-particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    background: #D4AF37;
    border-radius: 50%;
    opacity: 0.15;
    filter: blur(1px);
  }
  .qr-shadow {
    box-shadow: 0 10px 30px -10px rgba(74, 14, 46, 0.2);
  }

  /* === HERO ROW: photo + QR side by side === */
  .hero-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2.5rem;
  }

  /* === PHOTO 3D === */
  .photo-scene {
    width: 120px;
    height: 120px;
    perspective: 600px;
    flex-shrink: 0;
  }
  .photo-card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    border-radius: 50%;
    animation: photoFloat 6s ease-in-out infinite;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    cursor: pointer;
  }
  .photo-card:hover {
    animation-play-state: paused;
    transform: rotateY(15deg) rotateX(-8deg) scale(1.08);
  }
  @keyframes photoFloat {
    0%   { transform: rotateY(-6deg) rotateX(3deg) translateY(0px); }
    25%  { transform: rotateY(6deg) rotateX(-3deg) translateY(-4px); }
    50%  { transform: rotateY(-4deg) rotateX(2deg) translateY(-8px); }
    75%  { transform: rotateY(4deg) rotateX(-2deg) translateY(-4px); }
    100% { transform: rotateY(-6deg) rotateX(3deg) translateY(0px); }
  }
  .photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #D4AF37;
    box-shadow:
      0 0 0 6px rgba(212,175,55,0.15),
      0 20px 40px rgba(74,14,46,0.25),
      inset 0 2px 4px rgba(255,255,255,0.3);
    background: #fff;
  }
  .photo-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.05) brightness(1.02);
  }
  /* Gold ring pulse */
  .photo-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.4);
    animation: ringPulse 3s ease-in-out infinite;
  }
  .photo-ring-2 {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.2);
    animation: ringPulse 3s ease-in-out infinite 0.5s;
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.04); }
  }

  /* === QR CONTAINER === */
  .qr-scene {
    width: 140px;
    height: 140px;
    perspective: 600px;
    flex-shrink: 0;
  }
  .qr-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    border-radius: 1.5rem;
    animation: qrFloat 5s ease-in-out infinite 1s;
    transition: transform 0.5s ease;
    cursor: pointer;
  }
  .qr-3d:hover {
    animation-play-state: paused;
    transform: rotateY(-12deg) rotateX(6deg) scale(1.05);
  }
  @keyframes qrFloat {
    0%   { transform: rotateY(5deg)  rotateX(-2deg) translateY(0px); }
    33%  { transform: rotateY(-5deg) rotateX(3deg)  translateY(-5px); }
    66%  { transform: rotateY(3deg)  rotateX(-3deg) translateY(-3px); }
    100% { transform: rotateY(5deg)  rotateX(-2deg) translateY(0px); }
  }
  .qr-face {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 1.5rem;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow:
      0 14px 32px rgba(74,14,46,0.18),
      0 4px 8px rgba(74,14,46,0.1),
      inset 0 1px 2px rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-face img {
    width: 112px;
    height: 112px;
    object-fit: contain;
  }
  /* Scan line animation */
  .scan-line {
    position: absolute;
    left: 6px;
    right: 6px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    border-radius: 2px;
    animation: scanMove 2.5s linear infinite;
    opacity: 0;
  }
  .qr-3d:hover .scan-line {
    opacity: 1;
  }
  @keyframes scanMove {
    0%   { top: 8%; }
    100% { top: 88%; }
  }
  /* Tap label */
  .tap-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    background: #4A0E2E;
    color: white;
    padding: 4px 14px;
    border-radius: 9999px;
    font-size: 9px;
    letter-spacing: 0.2em;
    font-weight: 600;
  }
</style>
</head>
